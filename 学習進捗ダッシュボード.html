<style>
:root{--bg:#f4f5f7;--panel:#ffffff;--ink:#1c2430;--muted:#5b6675;--line:#e2e6ec;
  --accent:#4f46e5;--quiz:#2563eb;--fill:#059669;--track:#dfe4ea;--h40:#facc15;--h50:#22c55e;--h60:#047857;}
@media (prefers-color-scheme:dark){:root{--bg:#12161d;--panel:#1a212b;--ink:#e6ebf2;--muted:#95a1b2;
  --line:#29323f;--accent:#8b86f5;--quiz:#6ea8ff;--fill:#4cd6a0;--track:#2b3542;--h40:#eab308;--h50:#34d399;--h60:#059669;}}
:root[data-theme="dark"]{--bg:#12161d;--panel:#1a212b;--ink:#e6ebf2;--muted:#95a1b2;--line:#29323f;
  --accent:#8b86f5;--quiz:#6ea8ff;--fill:#4cd6a0;--track:#2b3542;--h40:#eab308;--h50:#34d399;--h60:#059669;}
:root[data-theme="light"]{--bg:#f4f5f7;--panel:#ffffff;--ink:#1c2430;--muted:#5b6675;--line:#e2e6ec;
  --accent:#4f46e5;--quiz:#2563eb;--fill:#059669;--track:#dfe4ea;--h40:#facc15;--h50:#22c55e;--h60:#047857;}
*{box-sizing:border-box}
body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.55;font-feature-settings:"palt";-webkit-font-smoothing:antialiased}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px 80px}
header.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 92%,transparent);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:1000px;margin:0 auto;padding:12px 20px 0;position:relative}
.hdtoggle{position:absolute;top:10px;right:16px;appearance:none;border:1px solid var(--line);background:var(--panel);
  color:var(--muted);font:inherit;font-size:.7rem;font-weight:700;border-radius:20px;padding:3px 11px;cursor:pointer;z-index:3;white-space:nowrap}
h1,.sub{padding-right:70px}
.hdtoggle:hover{border-color:var(--muted);color:var(--ink)}
.hdtoggle:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.hd.collapsed h1,.hd.collapsed .sub{display:none}
.hd.collapsed{padding:0 92px 0 20px}
.hd.collapsed .tabbar{margin-top:0}
.hd.collapsed .hdtoggle{top:2px}
h1{font-size:1.18rem;margin:0}.sub{color:var(--muted);font-size:.76rem;margin:2px 0 0}
.tabbar{display:flex;flex-wrap:wrap;gap:3px 2px;margin-top:8px}
.tabbar::-webkit-scrollbar{height:0}
.tabbtn{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-weight:700;
  font-size:.78rem;padding:6px 9px;cursor:pointer;border-bottom:2px solid transparent;border-radius:7px 7px 0 0;white-space:nowrap;flex:none}
.tabbtn:hover{color:var(--ink);background:color-mix(in srgb,var(--accent) 6%,transparent)}
.tabbtn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tabbtn:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.panel{display:none}.panel.active{display:block}
.bar{height:8px;border-radius:5px;background:var(--track);overflow:hidden;display:flex}
.bar i{height:100%}.bar .q{background:var(--quiz)}.bar .f{background:var(--fill)}
.pct{font-weight:800;font-variant-numeric:tabular-nums;text-align:right}
.frac{color:var(--muted);font-size:.72rem;font-variant-numeric:tabular-nums}
.frac b{color:var(--ink);font-weight:600}
.hero{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 18px;margin:16px 0 14px;
  display:grid;grid-template-columns:auto auto 1fr;gap:16px;align-items:center}
@media(max-width:560px){.hero{grid-template-columns:auto auto;gap:12px 16px}.herostat{grid-column:1/-1}}
.gauge{--p:0;width:72px;height:72px;border-radius:50%;flex:none;display:grid;place-items:center;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--track) 0)}
.gauge .lb.gcc{color:var(--fill);font-weight:700}
.gauge .in{width:54px;height:54px;border-radius:50%;background:var(--panel);display:grid;place-items:center;text-align:center}
.gauge .big{font-size:1.12rem;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.gauge .lb{font-size:.52rem;color:var(--muted);margin-top:1px}
.herostat{min-width:0}
.herostat .row{display:flex;align-items:center;gap:10px;margin:3px 0}
.herostat .lg{font-size:.74rem;color:var(--muted);min-width:48px}
.herostat .bar{flex:1;height:7px}
.herostat .v{font-size:.78rem;font-variant-numeric:tabular-nums;min-width:78px;text-align:right;color:var(--ink)}
.herostat .ccmini{font-size:.76rem;font-weight:700;font-variant-numeric:tabular-nums}
.herostat .ccmini .cctot{color:var(--muted);font-size:.72rem;font-weight:400}
.heronote{grid-column:1/-1;color:var(--muted);font-size:.72rem;border-top:1px dashed var(--line);padding-top:7px;margin-top:0}
.heronote b{color:var(--ink)}
/* カテゴリ（論点タブ）数ベースの進捗 */
.ccsum{font-size:.82rem;margin:2px 0 10px;color:var(--muted)}
.ccsum b{color:var(--ink);font-size:1rem}
.cc-done{color:var(--fill);font-weight:800}
.cc-wip{color:#d97706;font-weight:700}
.cc-todo{color:var(--muted);font-weight:700}
.ccrow{display:grid;grid-template-columns:118px 1fr auto;gap:12px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
.ccrow:last-child{border-bottom:0}
.ccname{font-weight:600;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ccbar{height:15px;border-radius:5px;background:var(--track);overflow:hidden;display:flex}
.ccbar i{height:100%}.ccbar .cc-d{background:var(--fill)}.ccbar .cc-w{background:#f59e0b}
.ccnum{font-size:.82rem;font-variant-numeric:tabular-nums;white-space:nowrap}
.ccnum .cctot{color:var(--muted);font-size:.72rem;margin-left:2px}
.cclgd{display:flex;gap:14px;flex-wrap:wrap;font-size:.72rem;color:var(--muted);margin:0 0 10px}
.cclgd i{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-1px;margin-right:4px}
.cclgd .l-d{background:var(--fill)}.cclgd .l-w{background:#f59e0b}.cclgd .l-t{background:var(--track);border:1px solid var(--line)}
@media(max-width:480px){.ccrow{grid-template-columns:78px 1fr auto;gap:7px}.ccname{font-size:.8rem}.ccnum{font-size:.76rem;text-align:right}.ccnum .cctot{display:block;margin:0}}
.sec-h{font-size:.82rem;font-weight:700;color:var(--muted);margin:20px 2px 8px;letter-spacing:.02em}
.diff{background:color-mix(in srgb,var(--fill) 8%,var(--panel));border:1px solid color-mix(in srgb,var(--fill) 35%,var(--line));
  border-radius:14px;padding:12px 16px;margin:16px 0 4px}
.diff.none{background:var(--panel);border-color:var(--line)}
.diffhd{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.difftag{font-size:.66rem;font-weight:800;color:#fff;background:var(--fill);border-radius:20px;padding:2px 10px}
.diff.none .difftag{background:var(--muted)}
.diffmain{font-weight:800;font-size:.95rem;font-variant-numeric:tabular-nums}
.diffdelta{color:var(--fill);font-weight:800}
.diffsub{color:var(--muted);font-size:.76rem;margin-left:auto}
.difftabs{margin-top:8px;display:grid;gap:3px}
.difftab{font-size:.78rem;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.difftab .dt-s{font-size:.66rem;font-weight:700;color:var(--accent)}
.difftab .dt-n{font-weight:600}
.difftab .dt-d{color:var(--fill);font-weight:700;font-variant-numeric:tabular-nums}
.difftab .dt-p{color:var(--muted);font-size:.72rem}
.rankcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px 16px}
.rankrow{display:flex;flex-wrap:wrap;gap:8px 18px;padding:8px 0}
.rkcell{display:flex;align-items:center;gap:8px;min-width:200px;flex:1 1 200px}
.rkcell .pct{font-weight:700;min-width:38px;text-align:right}
.rkcell .frac{color:var(--muted);font-size:.7rem;min-width:52px}
.rkmx{border-collapse:collapse;width:100%;font-size:.78rem;margin:2px 0}
.rkmx th,.rkmx td{border:1px solid var(--line);padding:4px 6px;text-align:center}
.rkmx td.mxsubj{text-align:left;white-space:nowrap;font-weight:600;background:var(--panel)}
.rkmx td.mxtot{font-weight:700}
.rkmx td.na{color:var(--muted)}
.rrow{display:grid;grid-template-columns:20px 120px 1fr 92px 46px;gap:12px;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--line)}
.rrow:last-child{border-bottom:0}
.rk{font-size:.66rem;font-weight:700;color:#fff;background:var(--accent);border-radius:50%;width:20px;height:20px;display:grid;place-items:center}
.rnm{font-weight:600;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rrow .pct{color:var(--accent)}
.heat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;overflow-x:auto}
.hrow{display:grid;grid-template-columns:132px 1fr;gap:12px;align-items:center;margin:7px 0}
.hlab{font-size:.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cells{display:flex;flex-wrap:wrap;gap:4px}
.cell{width:25px;height:25px;border-radius:5px;display:grid;place-items:center;font-size:.58rem;font-weight:700;
  color:#0d1b12;border:1px solid color-mix(in srgb,var(--ink) 8%,transparent);cursor:default}
.cell.dark{color:#eafff4}
.hb{display:inline-block;width:14px;height:14px;border-radius:4px;vertical-align:-2px;border:1px solid color-mix(in srgb,var(--ink) 10%,transparent)}
.rkmx td.hdark{color:#eafff4}
.legendrow{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--muted);margin-top:10px}
.scale{width:120px;height:10px;border-radius:5px;background:linear-gradient(90deg,var(--track),var(--fill))}
.cat{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
.cathead{display:flex;align-items:center;gap:13px;padding:13px 18px}
.rank{font-size:.66rem;font-weight:700;color:#fff;background:var(--accent);border-radius:50%;
  width:21px;height:21px;display:grid;place-items:center;flex:none}
.catname{font-size:1rem;font-weight:700}.cathead .frac{margin-left:auto}
.cathead .pct{font-size:1.12rem;color:var(--accent);min-width:46px}
.catbar{padding:0 18px 12px}.filewrap{padding:2px 12px 12px}
details.file,details.tab{margin:5px 0}
details.file>summary,details.tab>summary{list-style:none;cursor:pointer;display:grid;
  grid-template-columns:14px 1fr auto auto;gap:10px;align-items:center;padding:8px 10px;border-radius:9px}
summary::-webkit-details-marker{display:none}
details.file>summary:hover,details.tab>summary:hover{background:color-mix(in srgb,var(--accent) 6%,transparent)}
details.file[open]>summary{background:color-mix(in srgb,var(--accent) 6%,transparent)}
.tw{display:grid;grid-template-columns:100px auto;gap:8px;align-items:center;min-width:0}
.tw .bar{width:100px}
.caret{color:var(--muted);font-size:.75rem;transition:transform .15s}
details[open]>summary .caret{transform:rotate(90deg)}
.fname{font-weight:600;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file>summary .pct{font-size:.98rem;min-width:42px}
.tabbox{padding:2px 6px 8px 22px}
.tabname{font-weight:600;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab>summary .pct{font-size:.9rem;min-width:40px}
.cards{padding:2px 4px 6px 30px;display:grid;gap:5px}
.card{display:grid;grid-template-columns:1fr 90px auto auto;gap:9px;align-items:center}
.cname{font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .bar{width:90px;height:6px}.card .pct{font-size:.78rem;min-width:38px;font-weight:700}
.card .frac{font-size:.68rem;white-space:nowrap}
.z{opacity:.5}
/* priority tab */
.prbar{display:flex;align-items:center;gap:10px;margin:18px 0 8px;flex-wrap:wrap}
.prbar .lbl{font-size:.78rem;color:var(--muted)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{appearance:none;border:0;background:var(--panel);color:var(--muted);font:inherit;font-size:.78rem;
  font-weight:700;padding:6px 13px;cursor:pointer}
.seg button.on{background:var(--accent);color:#fff}
.seg button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.prcat{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
.prhead{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
.prhead .rank{flex:none}.prhead .catname{font-size:.98rem}
.prhead .pct{margin-left:auto;color:var(--accent);font-size:1.05rem}
.prlist{padding:4px 8px 10px}
.pritem{display:grid;grid-template-columns:26px 1fr 96px 92px 44px;gap:11px;align-items:center;padding:7px 8px;border-radius:8px}
.pritem:hover{background:color-mix(in srgb,var(--accent) 5%,transparent)}
.pnum{font-size:.72rem;font-weight:700;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}
.pmain{min-width:0}
.ptitle{font-size:.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pctx{font-size:.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pritem .bar{width:96px;height:7px}
.pritem .frac{font-size:.68rem;white-space:nowrap}
.pritem .pct{font-size:.82rem;min-width:40px}
.pritem.hot .pnum{color:#c2410c}
/* rank-grouped view */
.rkgroup{margin:0 0 6px}
.rkband{display:flex;align-items:center;gap:10px;position:sticky;top:0;padding:8px 4px 6px;background:var(--bg)}
.rkbadge{font-weight:800;font-size:.82rem;color:#fff;border-radius:7px;min-width:26px;height:24px;display:grid;place-items:center;padding:0 6px}
.rk-S{background:#dc2626}.rk-A{background:#ea580c}.rk-B{background:#16a34a}.rk-C{background:#2563eb}.rk-D{background:#64748b}.rk-E{background:#94a3b8}
.rklabel{font-size:.78rem;color:var(--muted);font-weight:700}
.topicrow{display:grid;grid-template-columns:22px 34px 1fr 96px 92px 44px;gap:11px;align-items:center;
  padding:8px;border-radius:9px;background:var(--panel);border:1px solid var(--line);margin:4px 0}
.topicrow.hot{border-color:color-mix(in srgb,#ea580c 40%,var(--line))}
.minchk{display:grid;place-items:center;cursor:pointer;margin:0}
.minchk input{width:16px;height:16px;cursor:pointer;accent-color:var(--fill);margin:0}
.topicrow.mindone,.growrow.mindone{background:color-mix(in srgb,var(--fill) 11%,var(--panel));border-color:color-mix(in srgb,var(--fill) 45%,var(--line))}
.minbadge{display:inline-block;font-size:.6rem;font-weight:800;color:#fff;background:var(--fill);border-radius:7px;padding:0 6px;margin-left:6px;vertical-align:1px}
.pct-min{color:var(--fill)}
/* 自然に40%(CC_TH)超え＝青系（強制の緑と区別） */
.topicrow.natdone,.growrow.natdone{background:color-mix(in srgb,var(--quiz) 8%,var(--panel));border-color:color-mix(in srgb,var(--quiz) 42%,var(--line))}
.natbadge{display:inline-block;font-size:.6rem;font-weight:800;color:#fff;background:var(--quiz);border-radius:7px;padding:0 6px;margin-left:6px;vertical-align:1px}
.pct-nat{color:var(--quiz)}
.pct-b40{color:#d97706}.pct-b50{color:#16a34a}.pct-b60{color:#047857}
.natbadge.nb40{background:#d97706}.natbadge.nb50{background:#16a34a}.natbadge.nb60{background:#047857}
@media(prefers-color-scheme:dark){.pct-b40{color:#fbbf24}.pct-b50{color:#4ade80}.pct-b60{color:#34d399}}
:root[data-theme="dark"] .pct-b40{color:#fbbf24}:root[data-theme="dark"] .pct-b50{color:#4ade80}:root[data-theme="dark"] .pct-b60{color:#34d399}
:root[data-theme="light"] .pct-b40{color:#d97706}:root[data-theme="light"] .pct-b50{color:#16a34a}:root[data-theme="light"] .pct-b60{color:#047857}
.cospa{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:.95rem;font-weight:700;justify-self:center}
.cs-d{background:#dcfce7;color:#15803d}.cs-c{background:#ccfbf1;color:#0f766e}
.cs-t{background:#fef3c7;color:#b45309}.cs-x{background:#fee2e2;color:#b91c1c}
.tmain{min-width:0}.tnm{font-size:.86rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsrc{font-size:.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topicrow .bar{width:96px;height:7px}.topicrow .frac{font-size:.68rem;white-space:nowrap}.topicrow .pct{font-size:.82rem;min-width:40px}
.growrow{display:grid;grid-template-columns:22px 26px 28px 1fr 96px 92px 44px;gap:10px;align-items:center;
  padding:8px;border-radius:9px;background:var(--panel);border:1px solid var(--line);margin:4px 0}
.growrow.hot{border-color:color-mix(in srgb,#ea580c 40%,var(--line))}
.growrow .rkbadge{min-width:24px;height:22px;font-size:.74rem;border-radius:6px}
.ptitle .rkbadge{display:inline-grid;width:auto;min-width:20px;height:18px;font-size:.66rem;padding:0 6px;border-radius:6px;vertical-align:-3px}
.gsubj{font-size:.66rem;color:var(--accent);font-weight:700}
.gseg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-left:6px}
.gseg button{appearance:none;border:0;background:var(--panel);color:var(--muted);font:inherit;font-size:.76rem;font-weight:700;padding:5px 12px;cursor:pointer}
.gseg button.on{background:var(--accent);color:#fff}
.subjsearch{display:block;width:100%;max-width:360px;padding:7px 11px;margin:10px 0 2px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);font:inherit;font-size:.82rem}
.subjsearch:focus{outline:none;border-color:var(--accent)}
.rfil{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin:10px 0 2px}
.rfil .lb{font-size:.72rem;color:var(--muted);margin-right:2px}
.rfchip{appearance:none;border:1.5px solid var(--line);background:var(--panel);color:var(--muted);
  font:inherit;font-size:.74rem;font-weight:800;border-radius:20px;padding:3px 12px;cursor:pointer;transition:all .12s}
.rfchip:hover{border-color:var(--muted)}
.rfchip:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.rkhint{font-size:.73rem;color:var(--muted);margin:16px 0 2px;line-height:1.7}
.rkhint .cospa{display:inline-grid;width:20px;height:20px;font-size:.8rem;vertical-align:-5px;margin:0 2px}
.logday{margin:14px 0 6px}
.logday-h{display:flex;align-items:baseline;gap:10px;font-weight:800;font-size:.98rem;position:sticky;top:0;background:var(--bg);padding:6px 2px;z-index:1}
.logday-h .dt{color:var(--accent)}
.logday-h .sum{color:var(--fill)}
.logday-h .rel{font-size:.68rem;font-weight:800;color:#fff;background:var(--accent);border-radius:20px;padding:2px 10px}
.logtabs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 6px}
.logtab{appearance:none;border:1px solid var(--line);background:var(--panel);color:var(--muted);font:inherit;font-size:.74rem;font-weight:700;border-radius:20px;padding:4px 12px;cursor:pointer;white-space:nowrap}
.logtab:hover{color:var(--ink);border-color:var(--muted)}
.logtab.active{color:#fff;background:var(--accent);border-color:var(--accent)}
.logtab:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.ntopic{font-size:.82rem;font-weight:800;color:#fff;background:var(--accent);border-radius:10px;padding:1px 9px;white-space:nowrap;font-variant-numeric:tabular-nums}
.catsum{font-size:.7rem;font-weight:700;color:var(--fill);background:color-mix(in srgb,var(--fill) 13%,transparent);border:1px solid color-mix(in srgb,var(--fill) 30%,var(--line));border-radius:10px;padding:1px 8px;white-space:nowrap}
.cbadge{font-size:.62rem;font-weight:800;border-radius:8px;padding:1px 6px;margin-left:2px;white-space:nowrap}
.cb-done{color:#fff;background:var(--fill)}
.cb-start{color:#7c4a03;background:#fcd775}
.logent{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:9px 14px;margin:6px 0}
.logent-h{display:flex;align-items:baseline;gap:10px;font-size:.76rem;color:var(--muted);margin-bottom:4px;flex-wrap:wrap}
.logent-h .d{color:var(--fill);font-weight:800;font-size:.85rem}
.logrow{font-size:.8rem;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap;padding:2px 0}
.logrow .s{font-size:.66rem;font-weight:700;color:var(--accent)}

/* 科目別タブの検索（科目ごとに保持・CSS表示切替で入力を保つ） */
var searchBySubj={};
function applySearch(pan,q){
  q=(q||'').trim().toLowerCase();

function topicRow(t,subj){
  var mk=isMin(subj,t.name),nat=!mk&&t.pct>=CC_TH,hot=!mk&&t.pct===0;
  var pd=mk?CC_TH:t.pct;

  var chk='<label class="minchk" title="最低限チェック＝完了扱い（例外）"><input type="checkbox" class="mincheck" data-subj="'+esc(subj)+'" data-tab="'+esc(t.name)+'"'+(mk?' checked':'')+'></label>';
  var cb=t.cospa?('<span class="cospa '+(COS[t.cospa]||'cs-c')+'" title="コスパ '+t.cospa+'＝学習量に対する効果">'+t.cospa+'</span>'):'<span class="cospa" style="background:transparent"></span>';
  var bd=band(t.pct);var badge=mk?'<span class="minbadge">✔最低限</span>':(nat?'<span class="natbadge nb'+bd+'">✓'+bd+'%↑</span>':'');
  return '<div class="topicrow'+(hot?' hot':'')+(mk?' mindone':(nat?' natdone':''))+'" data-s="'+esc(((t.name||'')+' '+(t.src||'')).toLowerCase())+'">'+chk+cb
    +'<span class="tmain"><span class="tnm">'+esc(t.name)+badge+'</span><span class="tsrc">'+esc(t.src)+'</span></span>'
    +bh+'<span class="frac">'+frac(t.dq,t.q,t.df,t.blk)+'</span>'

function renderRank(s,pan){
  var h='<div class="rkhint">ランク順（<b>S=最頻出</b>→D/Eは低頻度）に「取り組む課題」を配置。'
    +'<br>コスパ＝学習量に対する効果：<span class="cospa cs-d">◎</span>高い '
    +'<span class="cospa cs-c">○</span>標準 <span class="cospa cs-t">△</span>やや重い '
    +'<span class="cospa cs-x">✕</span>重い　→ 同ランクなら◎から先に。'
    +'<br>左端の□にチェック＝<b>最低限でOK</b>（達成率に関わらず完了扱い・例外）。</div>';

  h+='<input class="subjsearch" type="search" placeholder="🔍 論点を検索（この科目内）" value="'+esc(searchBySubj[s.name]||'')+'">';
  // この科目に存在するランク＋未設定
  var present=RANKS.filter(function(rk){return s.topics.some(function(t){return t.rank===rk;});});
  var hasUn=s.topics.some(function(t){return !t.rank;});
  var keys=present.concat(hasUn?['_un']:[]);
  var allSel=keys.every(function(k){return prRanks.has(k);});
  // ランク絞り込みチップ
  h+='<div class="rfil"><span class="lb">ランク絞り込み:</span>'
    +'<button class="rfchip prfall"'+(allSel?' style="background:var(--accent);color:#fff;border-color:transparent"':'')+'>全</button>';
  present.forEach(function(rk){var on=prRanks.has(rk);
    h+='<button class="rfchip prfr" data-r="'+rk+'"'+(on?' style="background:'+RKCOL[rk]+';color:#fff;border-color:transparent"':'')+'>'+rk+'</button>';});
  if(hasUn){var on=prRanks.has('_un');
    h+='<button class="rfchip prfr" data-r="_un"'+(on?' style="background:#94a3b8;color:#fff;border-color:transparent"':'')+'>未</button>';}
  h+='</div>';
  var shown=0;
  RANKS.forEach(function(rk){
    if(!prRanks.has(rk))return;
    var ts=s.topics.filter(function(t){return t.rank===rk;});
    if(!ts.length)return;
    shown+=ts.length;
    ts.sort(function(a,b){return (COSORD[a.cospa]-COSORD[b.cospa])||(effPct(s.name,a)-effPct(s.name,b));});
    h+='<div class="rkgroup"><div class="rkband"><span class="rkbadge rk-'+rk+'">'+rk+'</span>'
      +'<span class="rklabel">ランク '+rk+'（'+ts.length+'論点）</span></div>';
    ts.forEach(function(t){h+=topicRow(t,s.name);});
    h+='</div>';
  });
  var un=s.topics.filter(function(t){return !t.rank;});
  if(un.length&&prRanks.has('_un')){
    shown+=un.length;
    h+='<div class="rkgroup"><div class="rkband"><span class="rkbadge rk-E" style="background:#cbd5e1;color:#334155">–</span><span class="rklabel">ランク未設定（'+un.length+'）</span></div>';
    un.sort(function(a,b){return effPct(s.name,a)-effPct(s.name,b);});
    un.forEach(function(t){h+=topicRow(t,s.name);});
    h+='</div>';
  }
  if(!shown)h+='<div class="rkhint" style="text-align:center">選択中のランクに該当する論点がありません。</div>';
  pan.innerHTML=h;
  // チップのイベント
  pan.querySelectorAll('.prfr').forEach(function(b){b.addEventListener('click',function(){
    var r=b.getAttribute('data-r');if(prRanks.has(r))prRanks.delete(r);else prRanks.add(r);savePrRanks();renderPr();});});
  var fall=pan.querySelector('.prfall');
  if(fall)fall.addEventListener('click',function(){
    var allOn=keys.every(function(k){return prRanks.has(k);});
    keys.forEach(function(k){if(allOn)prRanks.delete(k);else prRanks.add(k);});savePrRanks();renderPr();});
  // 検索：入力で再描画せずCSS表示切替（フォーカス保持）
  var si=pan.querySelector('.subjsearch');
  if(si){si.addEventListener('input',function(){searchBySubj[s.name]=si.value;applySearch(pan,si.value);});}
  applySearch(pan,searchBySubj[s.name]||'');
}
function renderItems(s,pan){
  // 各項目にランク付与（経済学は ECON_RANK）
  var withR=s.items.map(function(it){return {it:it,rk:itemRank(it)};});

      +'<span class="pct">'+it.pct+'%</span></div>';
  });
  if(!vis.length)h+='<div class="rkhint" style="text-align:center">選択中のランクに該当する項目がありません。</div>';
  h+='</div></div>';pan.innerHTML=h;
  pan.querySelector('.prlow').addEventListener('click',function(){prMode='low';renderPr();});
  pan.querySelector('.prhigh').addEventListener('click',function(){prMode='high';renderPr();});
  pan.querySelectorAll('.prfr').forEach(function(b){b.addEventListener('click',function(){
    var r=b.getAttribute('data-r');if(prRanks.has(r))prRanks.delete(r);else prRanks.add(r);savePrRanks();renderPr();});});
  var fall=pan.querySelector('.prfall');
  if(fall)fall.addEventListener('click',function(){
    var allOn=keys.every(function(k){return prRanks.has(k);});
    keys.forEach(function(k){if(allOn)prRanks.delete(k);else prRanks.add(k);});savePrRanks();renderPr();});
}

var PREF_KEY='dashPrefV1';
function loadPref(){try{return JSON.parse(localStorage.getItem(PREF_KEY))||{};}catch(e){return {};}}
function savePref(){try{localStorage.setItem(PREF_KEY,JSON.stringify({mode:gMode,ranks:Array.from(gRanks),subjs:Array.from(gSubjs)}));}catch(e){}}
var _pf=loadPref();
var gMode=_pf.mode==='pct'?'pct':'rank';

var gSubjs=new Set(Array.isArray(_pf.subjs)&&_pf.subjs.length?_pf.subjs:ALL_SUBJS);
function growRow(x,showBadge){
  var t=x.t,mk=isMin(x.subj,t.name),nat=!mk&&t.pct>=CC_TH,hot=!mk&&t.pct===0;
  var pd=mk?CC_TH:t.pct;
  var bh=mk?('<div class="bar"><i class="f" style="width:'+CC_TH+'%"></i></div>'):bar(t.dq,t.df,t.den);

  var cb=t.cospa?('<span class="cospa '+(COS[t.cospa]||'cs-c')+'">'+t.cospa+'</span>'):'<span class="cospa" style="background:transparent"></span>';

      h+='<div class="rkgroup"><div class="rkband"><span class="rkbadge rk-'+rk+'">'+rk+'</span>'
        +'<span class="rklabel">ランク '+rk+'（'+ts.length+'）</span></div>';

      savePref();renderGlobal();
    });
  });
}
