<style>
:root{--bg:#f4f5f7;--panel:#ffffff;--ink:#1c2430;--muted:#5b6675;--line:#e2e6ec;
  --accent:#4f46e5;--quiz:#2563eb;--fill:#059669;--track:#dfe4ea;--h40:#facc15;--h50:#22c55e;--h60:#047857;}
@media (prefers-color-scheme:dark){:root{--bg:#12161d;--panel:#1a212b;--ink:#e6ebf2;--muted:#95a1b2;
  --line:#29323f;--accent:#8b86f5;--quiz:#6ea8ff;--fill:#4cd6a0;--track:#2b3542;--h40:#eab308;--h50:#34d399;--h60:#059669;}}
:root[data-theme="dark"]{--bg:#12161d;--panel:#1a212b;--ink:#e6ebf2;--muted:#95a1b2;--line:#29323f;
  --accent:#8b86f5;--quiz:#6ea8ff;--fill:#4cd6a0;--track:#2b3542;--h40:#eab308;--h50:#34d399;--h60:#059669;}
:root[data-theme="light"]{--bg:#f4f5f7;--panel:#ffffff;--ink:#1c2430;--muted:#5b6675;--line:#e2e6ec;
  --accent:#4f46e5;--quiz:#2563eb;--fill:#059669;--track:#dfe4ea;--h40:#facc15;--h50:#22c55e;--h60:#047857;}
*{box-sizing:border-box}
body{margin:0;font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,system-ui,sans-serif;
  background:var(--bg);color:var(--ink);min-height:100vh;line-height:1.55;font-feature-settings:"palt";-webkit-font-smoothing:antialiased}
.wrap{max-width:1000px;margin:0 auto;padding:0 20px 80px}
header.top{position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 92%,transparent);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line)}
.hd{max-width:1000px;margin:0 auto;padding:12px 20px 0;position:relative}
.hdtoggle{position:absolute;top:10px;right:16px;appearance:none;border:1px solid var(--line);background:var(--panel);
  color:var(--muted);font:inherit;font-size:.7rem;font-weight:700;border-radius:20px;padding:3px 11px;cursor:pointer;z-index:3;white-space:nowrap}
h1,.sub{padding-right:70px}
.hdtoggle:hover{border-color:var(--muted);color:var(--ink)}
.hdtoggle:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.hd.collapsed h1,.hd.collapsed .sub{display:none}
.hd.collapsed{padding:0 92px 0 20px}
.hd.collapsed .tabbar{margin-top:0}
.hd.collapsed .hdtoggle{top:2px}
h1{font-size:1.18rem;margin:0}.sub{color:var(--muted);font-size:.76rem;margin:2px 0 0}
.tabbar{display:flex;flex-wrap:wrap;gap:3px 2px;margin-top:8px}
.tabbar::-webkit-scrollbar{height:0}
.tabbtn{appearance:none;border:0;background:transparent;color:var(--muted);font:inherit;font-weight:700;
  font-size:.78rem;padding:6px 9px;cursor:pointer;border-bottom:2px solid transparent;border-radius:7px 7px 0 0;white-space:nowrap;flex:none}
.tabbtn:hover{color:var(--ink);background:color-mix(in srgb,var(--accent) 6%,transparent)}
.tabbtn.active{color:var(--accent);border-bottom-color:var(--accent)}
.tabbtn:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.panel{display:none}.panel.active{display:block}
.bar{height:8px;border-radius:5px;background:var(--track);overflow:hidden;display:flex}
.bar i{height:100%}.bar .q{background:var(--quiz)}.bar .f{background:var(--fill)}
.pct{font-weight:800;font-variant-numeric:tabular-nums;text-align:right}
.frac{color:var(--muted);font-size:.72rem;font-variant-numeric:tabular-nums}
.frac b{color:var(--ink);font-weight:600}
.hero{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:11px 18px;margin:16px 0 14px;
  display:grid;grid-template-columns:auto auto 1fr;gap:16px;align-items:center}
@media(max-width:560px){.hero{grid-template-columns:auto auto;gap:12px 16px}.herostat{grid-column:1/-1}}
.gauge{--p:0;width:72px;height:72px;border-radius:50%;flex:none;display:grid;place-items:center;
  background:conic-gradient(var(--accent) calc(var(--p)*1%),var(--track) 0)}
.gauge .lb.gcc{color:var(--fill);font-weight:700}
.gauge .in{width:54px;height:54px;border-radius:50%;background:var(--panel);display:grid;place-items:center;text-align:center}
.gauge .big{font-size:1.12rem;font-weight:800;line-height:1;font-variant-numeric:tabular-nums}
.gauge .lb{font-size:.52rem;color:var(--muted);margin-top:1px}
.herostat{min-width:0}
.herostat .row{display:flex;align-items:center;gap:10px;margin:3px 0}
.herostat .lg{font-size:.74rem;color:var(--muted);min-width:48px}
.herostat .bar{flex:1;height:7px}
.herostat .v{font-size:.78rem;font-variant-numeric:tabular-nums;min-width:78px;text-align:right;color:var(--ink)}
.herostat .ccmini{font-size:.76rem;font-weight:700;font-variant-numeric:tabular-nums}
.herostat .ccmini .cctot{color:var(--muted);font-size:.72rem;font-weight:400}
.heronote{grid-column:1/-1;color:var(--muted);font-size:.72rem;border-top:1px dashed var(--line);padding-top:7px;margin-top:0}
.heronote b{color:var(--ink)}
/* カテゴリ（論点タブ）数ベースの進捗 */
.ccsum{font-size:.82rem;margin:2px 0 10px;color:var(--muted)}
.ccsum b{color:var(--ink);font-size:1rem}
.cc-done{color:var(--fill);font-weight:800}
.cc-wip{color:#d97706;font-weight:700}
.cc-todo{color:var(--muted);font-weight:700}
.ccrow{display:grid;grid-template-columns:118px 1fr auto;gap:12px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line)}
.ccrow:last-child{border-bottom:0}
.ccname{font-weight:600;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ccbar{height:15px;border-radius:5px;background:var(--track);overflow:hidden;display:flex}
.ccbar i{height:100%}.ccbar .cc-d{background:var(--fill)}.ccbar .cc-w{background:#f59e0b}
.ccnum{font-size:.82rem;font-variant-numeric:tabular-nums;white-space:nowrap}
.ccnum .cctot{color:var(--muted);font-size:.72rem;margin-left:2px}
.cclgd{display:flex;gap:14px;flex-wrap:wrap;font-size:.72rem;color:var(--muted);margin:0 0 10px}
.cclgd i{display:inline-block;width:12px;height:12px;border-radius:3px;vertical-align:-1px;margin-right:4px}
.cclgd .l-d{background:var(--fill)}.cclgd .l-w{background:#f59e0b}.cclgd .l-t{background:var(--track);border:1px solid var(--line)}
@media(max-width:480px){.ccrow{grid-template-columns:78px 1fr auto;gap:7px}.ccname{font-size:.8rem}.ccnum{font-size:.76rem;text-align:right}.ccnum .cctot{display:block;margin:0}}
.sec-h{font-size:.82rem;font-weight:700;color:var(--muted);margin:20px 2px 8px;letter-spacing:.02em}
.diff{background:color-mix(in srgb,var(--fill) 8%,var(--panel));border:1px solid color-mix(in srgb,var(--fill) 35%,var(--line));
  border-radius:14px;padding:12px 16px;margin:16px 0 4px}
.diff.none{background:var(--panel);border-color:var(--line)}
.diffhd{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.difftag{font-size:.66rem;font-weight:800;color:#fff;background:var(--fill);border-radius:20px;padding:2px 10px}
.diff.none .difftag{background:var(--muted)}
.diffmain{font-weight:800;font-size:.95rem;font-variant-numeric:tabular-nums}
.diffdelta{color:var(--fill);font-weight:800}
.diffsub{color:var(--muted);font-size:.76rem;margin-left:auto}
.difftabs{margin-top:8px;display:grid;gap:3px}
.difftab{font-size:.78rem;display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.difftab .dt-s{font-size:.66rem;font-weight:700;color:var(--accent)}
.difftab .dt-n{font-weight:600}
.difftab .dt-d{color:var(--fill);font-weight:700;font-variant-numeric:tabular-nums}
.difftab .dt-p{color:var(--muted);font-size:.72rem}
.rankcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:6px 16px}
.rankrow{display:flex;flex-wrap:wrap;gap:8px 18px;padding:8px 0}
.rkcell{display:flex;align-items:center;gap:8px;min-width:200px;flex:1 1 200px}
.rkcell .pct{font-weight:700;min-width:38px;text-align:right}
.rkcell .frac{color:var(--muted);font-size:.7rem;min-width:52px}
.rkmx{border-collapse:collapse;width:100%;font-size:.78rem;margin:2px 0}
.rkmx th,.rkmx td{border:1px solid var(--line);padding:4px 6px;text-align:center}
.rkmx td.mxsubj{text-align:left;white-space:nowrap;font-weight:600;background:var(--panel)}
.rkmx td.mxtot{font-weight:700}
.rkmx td.na{color:var(--muted)}
.rkmx tbody td{cursor:help}
.rrow{display:grid;grid-template-columns:20px 120px 1fr 92px 46px;gap:12px;align-items:center;
  padding:9px 0;border-bottom:1px solid var(--line)}
.rrow:last-child{border-bottom:0}
.rk{font-size:.66rem;font-weight:700;color:#fff;background:var(--accent);border-radius:50%;width:20px;height:20px;display:grid;place-items:center}
.rnm{font-weight:600;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rrow .pct{color:var(--accent)}
.heat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px 16px;overflow-x:auto}
.hrow{display:grid;grid-template-columns:132px 1fr;gap:12px;align-items:center;margin:7px 0}
.hlab{font-size:.8rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cells{display:flex;flex-wrap:wrap;gap:4px}
.cell{width:25px;height:25px;border-radius:5px;display:grid;place-items:center;font-size:.58rem;font-weight:700;
  color:#0d1b12;border:1px solid color-mix(in srgb,var(--ink) 8%,transparent);cursor:default}
.cell.dark{color:#eafff4}
.hb{display:inline-block;width:14px;height:14px;border-radius:4px;vertical-align:-2px;border:1px solid color-mix(in srgb,var(--ink) 10%,transparent)}
.rkmx td.hdark{color:#eafff4}
.legendrow{display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--muted);margin-top:10px}
.scale{width:120px;height:10px;border-radius:5px;background:linear-gradient(90deg,var(--track),var(--fill))}
.cat{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
.cathead{display:flex;align-items:center;gap:13px;padding:13px 18px}
.rank{font-size:.66rem;font-weight:700;color:#fff;background:var(--accent);border-radius:50%;
  width:21px;height:21px;display:grid;place-items:center;flex:none}
.catname{font-size:1rem;font-weight:700}.cathead .frac{margin-left:auto}
.cathead .pct{font-size:1.12rem;color:var(--accent);min-width:46px}
.catbar{padding:0 18px 12px}.filewrap{padding:2px 12px 12px}
details.file,details.tab{margin:5px 0}
details.file>summary,details.tab>summary{list-style:none;cursor:pointer;display:grid;
  grid-template-columns:14px 1fr auto auto;gap:10px;align-items:center;padding:8px 10px;border-radius:9px}
summary::-webkit-details-marker{display:none}
details.file>summary:hover,details.tab>summary:hover{background:color-mix(in srgb,var(--accent) 6%,transparent)}
details.file[open]>summary{background:color-mix(in srgb,var(--accent) 6%,transparent)}
.tw{display:grid;grid-template-columns:100px auto;gap:8px;align-items:center;min-width:0}
.tw .bar{width:100px}
.caret{color:var(--muted);font-size:.75rem;transition:transform .15s}
details[open]>summary .caret{transform:rotate(90deg)}
.fname{font-weight:600;font-size:.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.file>summary .pct{font-size:.98rem;min-width:42px}
.tabbox{padding:2px 6px 8px 22px}
.tabname{font-weight:600;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab>summary .pct{font-size:.9rem;min-width:40px}
.cards{padding:2px 4px 6px 30px;display:grid;gap:5px}
.card{display:grid;grid-template-columns:1fr 90px auto auto;gap:9px;align-items:center}
.cname{font-size:.8rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .bar{width:90px;height:6px}.card .pct{font-size:.78rem;min-width:38px;font-weight:700}
.card .frac{font-size:.68rem;white-space:nowrap}
.z{opacity:.5}
/* priority tab */
.prbar{display:flex;align-items:center;gap:10px;margin:18px 0 8px;flex-wrap:wrap}
.prbar .lbl{font-size:.78rem;color:var(--muted)}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden}
.seg button{appearance:none;border:0;background:var(--panel);color:var(--muted);font:inherit;font-size:.78rem;
  font-weight:700;padding:6px 13px;cursor:pointer}
.seg button.on{background:var(--accent);color:#fff}
.seg button:focus-visible{outline:2px solid var(--accent);outline-offset:-2px}
.prcat{background:var(--panel);border:1px solid var(--line);border-radius:14px;margin-bottom:14px;overflow:hidden}
.prhead{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line)}
.prhead .rank{flex:none}.prhead .catname{font-size:.98rem}
.prhead .pct{margin-left:auto;color:var(--accent);font-size:1.05rem}
.prlist{padding:4px 8px 10px}
.pritem{display:grid;grid-template-columns:26px 1fr 96px 92px 44px;gap:11px;align-items:center;padding:7px 8px;border-radius:8px}
.pritem:hover{background:color-mix(in srgb,var(--accent) 5%,transparent)}
.pnum{font-size:.72rem;font-weight:700;color:var(--muted);text-align:center;font-variant-numeric:tabular-nums}
.pmain{min-width:0}
.ptitle{font-size:.85rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pctx{font-size:.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pritem .bar{width:96px;height:7px}
.pritem .frac{font-size:.68rem;white-space:nowrap}
.pritem .pct{font-size:.82rem;min-width:40px}
.pritem.hot .pnum{color:#c2410c}
/* rank-grouped view */
.rkgroup{margin:0 0 6px}
.rkband{display:flex;align-items:center;gap:10px;position:sticky;top:0;padding:8px 4px 6px;background:var(--bg)}
.rkbadge{font-weight:800;font-size:.82rem;color:#fff;border-radius:7px;min-width:26px;height:24px;display:grid;place-items:center;padding:0 6px}
.rk-S{background:#dc2626}.rk-A{background:#ea580c}.rk-B{background:#16a34a}.rk-C{background:#2563eb}.rk-D{background:#64748b}.rk-E{background:#94a3b8}
.rklabel{font-size:.78rem;color:var(--muted);font-weight:700}
.topicrow{display:grid;grid-template-columns:22px 34px 1fr 96px 92px 44px;gap:11px;align-items:center;
  padding:8px;border-radius:9px;background:var(--panel);border:1px solid var(--line);margin:4px 0}
.topicrow.hot{border-color:color-mix(in srgb,#ea580c 40%,var(--line))}
.minchk{display:grid;place-items:center;cursor:pointer;margin:0}
.minchk input{width:16px;height:16px;cursor:pointer;accent-color:var(--fill);margin:0}
.topicrow.mindone,.growrow.mindone{background:color-mix(in srgb,var(--fill) 11%,var(--panel));border-color:color-mix(in srgb,var(--fill) 45%,var(--line))}
.minbadge{display:inline-block;font-size:.6rem;font-weight:800;color:#fff;background:var(--fill);border-radius:7px;padding:0 6px;margin-left:6px;vertical-align:1px}
.pct-min{color:var(--fill)}
/* 自然に40%(CC_TH)超え＝青系（強制の緑と区別） */
.topicrow.natdone,.growrow.natdone{background:color-mix(in srgb,var(--quiz) 8%,var(--panel));border-color:color-mix(in srgb,var(--quiz) 42%,var(--line))}
.natbadge{display:inline-block;font-size:.6rem;font-weight:800;color:#fff;background:var(--quiz);border-radius:7px;padding:0 6px;margin-left:6px;vertical-align:1px}
.pct-nat{color:var(--quiz)}
.pct-b40{color:#d97706}.pct-b50{color:#16a34a}.pct-b60{color:#047857}
.natbadge.nb40{background:#d97706}.natbadge.nb50{background:#16a34a}.natbadge.nb60{background:#047857}
@media(prefers-color-scheme:dark){.pct-b40{color:#fbbf24}.pct-b50{color:#4ade80}.pct-b60{color:#34d399}}
:root[data-theme="dark"] .pct-b40{color:#fbbf24}:root[data-theme="dark"] .pct-b50{color:#4ade80}:root[data-theme="dark"] .pct-b60{color:#34d399}
:root[data-theme="light"] .pct-b40{color:#d97706}:root[data-theme="light"] .pct-b50{color:#16a34a}:root[data-theme="light"] .pct-b60{color:#047857}
.cospa{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:.95rem;font-weight:700;justify-self:center}
.cs-d{background:#dcfce7;color:#15803d}.cs-c{background:#ccfbf1;color:#0f766e}
.cs-t{background:#fef3c7;color:#b45309}.cs-x{background:#fee2e2;color:#b91c1c}
.tmain{min-width:0}.tnm{font-size:.86rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tsrc{font-size:.68rem;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topicrow .bar{width:96px;height:7px}.topicrow .frac{font-size:.68rem;white-space:nowrap}.topicrow .pct{font-size:.82rem;min-width:40px}
.growrow{display:grid;grid-template-columns:22px 26px 28px 1fr 96px 92px 44px;gap:10px;align-items:center;
  padding:8px;border-radius:9px;background:var(--panel);border:1px solid var(--line);margin:4px 0}
.growrow.hot{border-color:color-mix(in srgb,#ea580c 40%,var(--line))}
.growrow .rkbadge{min-width:24px;height:22px;font-size:.74rem;border-radius:6px}
.ptitle .rkbadge{display:inline-grid;width:auto;min-width:20px;height:18px;font-size:.66rem;padding:0 6px;border-radius:6px;vertical-align:-3px}
.gsubj{font-size:.66rem;color:var(--accent);font-weight:700}
.gseg{display:inline-flex;border:1px solid var(--line);border-radius:9px;overflow:hidden;margin-left:6px}
.gseg button{appearance:none;border:0;background:var(--panel);color:var(--muted);font:inherit;font-size:.76rem;font-weight:700;padding:5px 12px;cursor:pointer}
.gseg button.on{background:var(--accent);color:#fff}
.subjsearch{display:block;width:100%;max-width:360px;padding:7px 11px;margin:10px 0 2px;border:1px solid var(--line);border-radius:9px;background:var(--panel);color:var(--ink);font:inherit;font-size:.82rem}
.subjsearch:focus{outline:none;border-color:var(--accent)}
.rfil{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin:10px 0 2px}
.rfil .lb{font-size:.72rem;color:var(--muted);margin-right:2px}
.rfchip{appearance:none;border:1.5px solid var(--line);background:var(--panel);color:var(--muted);
  font:inherit;font-size:.74rem;font-weight:800;border-radius:20px;padding:3px 12px;cursor:pointer;transition:all .12s}
.rfchip:hover{border-color:var(--muted)}
.rfchip:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
.rkhint{font-size:.73rem;color:var(--muted);margin:16px 0 2px;line-height:1.7}
.rkhint .cospa{display:inline-grid;width:20px;height:20px;font-size:.8rem;vertical-align:-5px;margin:0 2px}
/* 最終暗記まとめ＝別枠（科目タブの最後・本体の達成率とは合算しない） */
.exsec{margin:26px 0 8px;border:2px dashed #c084fc;border-radius:14px;padding:12px 12px 8px;background:rgba(192,132,252,.06)}
.exhd{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.exhd .ttl{font-weight:900;font-size:.95rem;color:#7c3aed}
.exhd .sep{font-size:.7rem;font-weight:800;color:#fff;background:#a855f7;border-radius:20px;padding:2px 9px}
.exhd .big{margin-left:auto;font-weight:900;font-size:1.15rem;color:#7c3aed;font-variant-numeric:tabular-nums}
.exnote{font-size:.71rem;color:var(--muted);line-height:1.65;margin:2px 0 9px}
.exrow{display:grid;grid-template-columns:1fr 84px 78px 46px;gap:8px;align-items:center;
  padding:5px 4px;border-top:1px solid rgba(168,85,247,.22);font-size:.8rem}
.exrow .enm{font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.exrow .efr{font-size:.7rem;color:var(--muted);text-align:right;font-variant-numeric:tabular-nums}
.exrow .epc{text-align:right;font-weight:900;font-variant-numeric:tabular-nums}
.exrow .bar i.q{background:#a855f7}
@media(max-width:520px){.exrow{grid-template-columns:1fr 60px 42px}.exrow .efr{display:none}}
.logday{margin:14px 0 6px}
.logday-h{display:flex;align-items:baseline;gap:10px;font-weight:800;font-size:.98rem;position:sticky;top:0;background:var(--bg);padding:6px 2px;z-index:1}
.logday-h .dt{color:var(--accent)}
.logday-h .sum{color:var(--fill)}
.logday-h .rel{font-size:.68rem;font-weight:800;color:#fff;background:var(--accent);border-radius:20px;padding:2px 10px}
.logtabs{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0 6px}

<script>
var DATA=__DATA__;
var DIFF=__DIFF__;
var LOG=__LOG__;
var EXTRA=__EXTRA__;   /* 最終暗記まとめ＝別枠集計（本体の達成率には混ぜない） */
function esc(s){return (s+'').replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
/* 見出しヘッダーの表示/非表示（状態を保存） */
(function(){
  var HDKEY='dashHdCollapsed',hd=document.querySelector('.hd'),btn=document.getElementById('hdtoggle');
  function apply(){var c=localStorage.getItem(HDKEY)==='1';hd.classList.toggle('collapsed',c);btn.textContent=c?'▼ 見出し':'▲ 隠す';}
  btn.addEventListener('click',function(){
    var c=localStorage.getItem(HDKEY)==='1';try{localStorage.setItem(HDKEY,c?'0':'1');}catch(e){}apply();
  });
  apply();
})();
function bar(dq,df,den,h){return '<div class="bar"'+(h?' style="height:'+h+'"':'')+'><i class="q" style="width:'+(den?dq/den*100:0)+'%"></i><i class="f" style="width:'+(den?df/den*100:0)+'%"></i></div>';}
function frac(dq,q,df,b){return 'ク<b>'+dq+'</b>/'+q+' 穴<b>'+df+'</b>/'+b;}
function pctOf(a,b){return b?Math.round(a/b*100):0;}
// 達成率を 60/50/40% 以上で離散的に色分け（未満は薄いグラデ）
function heatBg(p){
  if(p>=60)return'var(--h60)';
  if(p>=50)return'var(--h50)';
  if(p>=40)return'var(--h40)';
  if(p>0)  return'color-mix(in srgb,var(--fill) '+Math.max(p,8)+'%,var(--track))';
  return'var(--track)';
}
// 達成率の帯（0/40/50/60）を返す
function band(p){return p>=60?60:p>=50?50:p>=40?40:0;}

var cats=[];var G={dq:0,q:0,df:0,blk:0},tabTot=0,tabZero=0;
for(var cat in DATA){
  var files=DATA[cat];var s={dq:0,q:0,df:0,blk:0};
  files.forEach(function(f){s.dq+=f.dq;s.q+=f.q;s.df+=f.df;s.blk+=f.blk;
    f.tabs.forEach(function(t){tabTot++;if((t.dq+t.df)===0)tabZero++;});});
  s.name=cat;s.files=files;s.pct=pctOf(s.dq+s.df,s.q+s.blk);
  cats.push(s);G.dq+=s.dq;G.q+=s.q;G.df+=s.df;G.blk+=s.blk;
}
cats.sort(function(a,b){return b.pct-a.pct;});
var gpct=pctOf(G.dq+G.df,G.q+G.blk);

/* 差分バー（全タブ共通・ヘッダー直下に常時表示） */
if(DIFF){
  var dd=DIFF.na-DIFF.oa, changed=DIFF.tabs&&DIFF.tabs.length;
  var dh='<div class="diff'+(changed?'':' none')+'">'
    +'<div class="diffhd"><span class="difftag">前回からの変化</span>'
    +(changed?('<span class="diffmain">達成 '+DIFF.oa+' → '+DIFF.na+' <span class="diffdelta">('+(dd>=0?'+':'')+dd+')</span></span>')
              :('<span class="diffmain" style="color:var(--muted)">変化なし</span>'))
    +'<span class="diffsub">'+pctOf(DIFF.oa,DIFF.ob)+'% → '+pctOf(DIFF.na,DIFF.nb)+'%'
    +(DIFF.subs&&DIFF.subs.length?'　｜　'+DIFF.subs.map(function(s){return esc(s.name)+' +'+s.d;}).join(' / '):'')
    +'</span></div>';
  if(changed){
    dh+='<div class="difftabs">';
    DIFF.tabs.forEach(function(t){
      var seg=[];if(t.ddq)seg.push('クイズ'+(t.ddq>0?'+':'')+t.ddq);if(t.ddf)seg.push('穴埋め'+(t.ddf>0?'+':'')+t.ddf);
      dh+='<div class="difftab"><span class="dt-s">'+esc(t.subj)+'</span>'
        +'<span class="dt-n">'+esc(t.tab)+'</span>'
        +'<span class="dt-d">'+seg.join('・')+'</span>'
        +'<span class="dt-p">'+t.op+'%→'+t.np+'%</span></div>';
    });
    dh+='</div>';
  }
  dh+='</div>';
  document.getElementById('diffbar').innerHTML=dh;
}

var ov=document.getElementById('p-ov');
/* ===== カテゴリ（論点タブ）数ベースの進捗：達成率 CC_TH% 以上＝完了（俯瞰・更新履歴で共通） ===== */
var CC_TH=40;
function ccBucket(p){return p>=CC_TH?'done':(p>0?'wip':'todo');}
/* 最低限チェック（例外的に完了扱い）：科目|論点名 を localStorage 保存。各科目タブ／総合優先で共有 */
var MIN_KEY='dashMinDoneV1';
function loadMin(){try{return new Set(JSON.parse(localStorage.getItem(MIN_KEY))||[]);}catch(e){return new Set();}}
var minSet=loadMin();
function minKey(subj,name){return subj+'|'+name;}
function isMin(subj,name){return minSet.has(minKey(subj,name));}
function isDone(subj,name,p){return p>=CC_TH||isMin(subj,name);}
function effPct(subj,t){return isMin(subj,t.name)?CC_TH:t.pct;}  /* 並び順用：最低限チェック済みは40%(CC_TH)扱い */
function toggleMin(subj,name,on){if(on)minSet.add(minKey(subj,name));else minSet.delete(minKey(subj,name));try{localStorage.setItem(MIN_KEY,JSON.stringify(Array.from(minSet)));}catch(e){}renderOv();if(typeof renderPr==='function')renderPr();if(typeof renderGlobal==='function')renderGlobal();}
function computeCC(){
  var g={done:0,wip:0,todo:0,tot:0};
  var list=cats.map(function(s){
    var b={done:0,wip:0,todo:0,tot:0};
    s.files.forEach(function(f){f.tabs.forEach(function(t){
      var den=t.q+t.blk,mk=isMin(s.name,t.name);
      if(den===0&&!mk)return;                          // 問題ゼロ かつ 未チェック＝論点として数えない（チェック済みは数える）
      var p=den?Math.round((t.dq+t.df)/den*100):0;
      b.tot++;
      b[(mk||p>=CC_TH)?'done':(p>0?'wip':'todo')]++;
    });});
    g.done+=b.done;g.wip+=b.wip;g.todo+=b.todo;g.tot+=b.tot;
    return {name:s.name,b:b};
  });
  return {g:g,list:list};
}
/* 経済学カード→頻出ランク（暫定・ロードマップ準拠。ズレは下の値を直すだけでOK） */
var ECON_RANK={
 '所得と需要量の関係（上級財・中級財・下級財）':'A',
 '需要の価格弾力性':'S',
 '需要の交差弾力性（粗代替財・粗補完財）':'B',
 '需要曲線とギッフェン財・特殊な無差別曲線':'A',
 '価格効果＝代替効果＋所得効果（スルツキー分解）':'A',
 '予算制約線':'C',
 '効用最大化条件と最適消費点':'A',
 '費用関数と利潤最大化条件':'A',
 '限界費用・平均費用・平均可変費用（グラフでの見分け）':'A',
 '損益分岐点・操業停止点':'B',
 '等費用線':'A',
 '等産出量曲線と最小費用':'B',
 '国際貿易論（比較優位・要素価格均等化）':'B',
 '自由貿易・保護貿易の余剰分析':'A',
 'プライス・メイカーと限界収入MR':'B',
 '利潤最大化MR=MCと死荷重':'A',
 '公共財・外部不経済（競合性×排除性）':'B',
 '費用逓減産業・情報の非対称性':'C',
 '寡占市場・屈折需要曲線（価格の硬直性）':'B',
 'ゲーム理論（ナッシュ均衡・支配戦略）':'B',
 '国内・国民／総額・純額（GDP・GNI・NDP）':'B',
 '計算対象（市場取引・帰属計算・生産活動）':'C',
 '三面等価の原則':'B',
 '名目GDP・実質GDP・物価指数':'B',
 '景気動向指数（先行・一致・遅行）':'D',
 '45度線分析と乗数効果':'S',
 '各種乗数（投資・政府支出・租税・均衡予算）':'S',
 'マネーストックと指標（M1・M2・M3）':'C',
 'ハイパワード・マネーと貨幣乗数':'B',
 '金融政策（公開市場操作・法定準備率操作）':'B',
 'IS曲線（財市場の均衡）':'A',
 'LM曲線（貨幣市場の均衡）':'B',
 '政策効果とクラウディング・アウト':'B',
 '労働市場（古典派 vs ケインズ）':'B',
 '総供給曲線(AS)・総需要曲線(AD)':'B',
 '消費の理論（5仮説）':'C',
 'マンデル＝フレミング・モデル（開放経済）':'S',
 '消費者余剰・生産者余剰・社会的余剰の基本':'S',
 '従量税の転嫁と余剰変化':'A',
 '価格規制（上限・下限）と余剰変化':'B',
 '損益分岐点・操業停止点と短期供給行動':'B',
 '完全競争市場の長期均衡':'B',
 'フィリップス曲線の基本と短期トレードオフ':'C',
 '自然失業率仮説と長期フィリップス曲線':'C',
 'スタグフレーションとフィリップス曲線のシフト':'C'
};

function renderOv(){
  var qpct=pctOf(G.dq,G.q),fpct=pctOf(G.df,G.blk);
  var _cc=computeCC(),gCC=_cc.g,ccList=_cc.list;
  var ccPct=Math.round(gCC.done/(gCC.tot||1)*100);
  var ccSeg1=(gCC.done/(gCC.tot||1)*100),ccSeg2=((gCC.done+gCC.wip)/(gCC.tot||1)*100);
  var h='<div class="hero">'
 +'<div class="gauge" style="--p:'+gpct+'"><div class="in"><div><div class="big">'+gpct+'%</div><div class="lb">全体達成率</div></div></div></div>'
 +'<div class="gauge gauge-cc" title="論点 完了'+gCC.done+'・着手中'+gCC.wip+'・未着手'+gCC.todo+'（全'+gCC.tot+'）" style="background:conic-gradient(var(--fill) 0 '+ccSeg1+'%,#f59e0b '+ccSeg1+'% '+ccSeg2+'%,var(--track) '+ccSeg2+'% 100%)"><div class="in"><div><div class="big">'+ccPct+'%</div><div class="lb gcc">論点完了率</div></div></div></div>'
 +'<div class="herostat">'
 +'<div class="row"><span class="lg">クイズ</span><div class="bar"><i class="q" style="width:'+qpct+'%"></i></div><span class="v">'+G.dq+' / '+G.q+'</span></div>'
 +'<div class="row"><span class="lg">穴埋め</span><div class="bar"><i class="f" style="width:'+fpct+'%"></i></div><span class="v">'+G.df+' / '+G.blk+'</span></div>'
 +'<div class="row"><span class="lg">論点</span><span class="ccmini"><span class="cc-done">完了'+gCC.done+'</span>・<span class="cc-wip">着手'+gCC.wip+'</span>・<span class="cc-todo">未'+gCC.todo+'</span>　<span class="cctot">/ 全'+gCC.tot+'</span></span></div>'
 +'</div>'
 +'<div class="heronote">全 <b>'+(G.q+G.blk)+'</b> 問中 <b>'+(G.dq+G.df)+'</b> 問こなした。論点は全 <b>'+gCC.tot+'</b> 中 完了 <b>'+gCC.done+'</b>（'+CC_TH+'%↑）。円グラフ＝<span class="cc-done">緑:完了</span>・<span class="cc-wip">橙:着手中</span>・<span style="color:var(--muted)">灰:未着手</span>。詳細は下の「論点数進捗」。</div>'
 +'</div>';
h+='<div class="sec-h">科目別 論点数（カテゴリ）進捗　<span style="font-weight:400;color:var(--muted)">※各論点の達成率で判定：'+CC_TH+'%以上＝完了・1〜'+(CC_TH-1)+'%＝着手中・0%＝未着手</span></div>';
h+='<div class="rankcard">';
h+='<div class="ccsum">全 <b>'+gCC.tot+'</b> 論点中　<span class="cc-done">完了 '+gCC.done+'</span>・<span class="cc-wip">着手中 '+gCC.wip+'</span>・<span class="cc-todo">未着手 '+gCC.todo+'</span>'
  +'（完了率 <b>'+Math.round(gCC.done/(gCC.tot||1)*100)+'%</b>）</div>';
h+='<div class="cclgd"><span><i class="l-d"></i>完了('+CC_TH+'%↑)</span><span><i class="l-w"></i>着手中(1〜'+(CC_TH-1)+'%)</span><span><i class="l-t"></i>未着手(0%)</span></div>';
ccList.slice().sort(function(a,b){return (b.b.done-a.b.done)||((b.b.done+b.b.wip)-(a.b.done+a.b.wip));}).forEach(function(s){
  var b=s.b,tot=b.tot||1;
  h+='<div class="ccrow"><span class="ccname">'+esc(s.name)+'</span>'
    +'<div class="ccbar" title="完了'+b.done+'・着手中'+b.wip+'・未着手'+b.todo+'（全'+b.tot+'論点）">'
    +(b.done?'<i class="cc-d" style="width:'+(b.done/tot*100)+'%"></i>':'')
    +(b.wip?'<i class="cc-w" style="width:'+(b.wip/tot*100)+'%"></i>':'')
    +'</div>'
    +'<span class="ccnum"><b class="cc-done">'+b.done+'</b> / <span class="cc-wip">'+b.wip+'</span> / <span class="cc-todo">'+b.todo+'</span><span class="cctot">全'+b.tot+'</span></span></div>';
});
h+='</div>';
h+='<div class="sec-h">科目別ランキング（問題数ベース）</div><div class="rankcard">';
cats.forEach(function(s,i){
  h+='<div class="rrow"><span class="rk">'+(i+1)+'</span><span class="rnm">'+esc(s.name)+'</span>'
   +bar(s.dq,s.df,(s.q+s.blk)||1)+'<span class="frac">'+frac(s.dq,s.q,s.df,s.blk)+'</span>'
   +'<span class="pct">'+s.pct+'%</span></div>';
});
h+='</div>';

/* ===== ランク別・科目別×ランク別 達成率 ===== */
var RKL=['S','A','B','C','D'];
var gRk={},sRk={};RKL.forEach(function(r){gRk[r]={a:0,b:0};});
cats.forEach(function(s){
  sRk[s.name]={};RKL.forEach(function(r){sRk[s.name][r]={a:0,b:0,items:[]};});
  s.files.forEach(function(f){f.tabs.forEach(function(t){
    function add(r,a,b,nm){if(!r||RKL.indexOf(r)<0||!b)return;
      gRk[r].a+=a;gRk[r].b+=b;sRk[s.name][r].a+=a;sRk[s.name][r].b+=b;
      sRk[s.name][r].items.push({name:nm,a:a,b:b});}
    if(t.rank&&RKL.indexOf(t.rank)>=0){add(t.rank,t.dq+t.df,t.q+t.blk,t.name);return;}
    /* タブにランクが無い科目（経済学）＝カード単位で ECON_RANK から集計してヒートマップに載せる */
    (t.cards||[]).forEach(function(c){
      var nm=(c.title||'').replace(/^[A-E]\s+/,'');
      add(ECON_RANK[nm],c.dq+c.df,c.q+c.blk,nm);
    });
  });});
});
/* マスのホバー説明：該当論点を達成率の低い順に列挙（低いものから手を付けられるように） */
function mxTip(subj,rank,c){
  var lines=[subj+' ／ '+rank+'ランク：'+pctOf(c.a,c.b)+'%（'+c.a+'/'+c.b+'問）','対象 '+c.items.length+'論点（達成率の低い順）:'];
  c.items.slice().sort(function(x,y){return pctOf(x.a,x.b)-pctOf(y.a,y.b);}).slice(0,14).forEach(function(it){
    lines.push('  '+pctOf(it.a,it.b)+'%  '+it.name+'（'+it.a+'/'+it.b+'）');
  });
  if(c.items.length>14)lines.push('  …ほか'+(c.items.length-14)+'論点');
  return lines.join('\n');
}
h+='<div class="sec-h">ランク別 達成率（S=最頻出→D）</div><div class="rankcard"><div class="rankrow">';
RKL.forEach(function(r){var g=gRk[r];if(!g.b)return;var p=pctOf(g.a,g.b);
  h+='<div class="rkcell" title="'+esc(r+'ランク（全科目）：'+p+'%（'+g.a+'/'+g.b+'問）')+'"><span class="rkbadge rk-'+r+'">'+r+'</span>'
   +'<div class="bar" style="flex:1"><i class="q" style="width:'+p+'%"></i></div>'
   +'<span class="pct">'+p+'%</span><span class="frac">'+g.a+'/'+g.b+'</span></div>';

function dayKey(ts){
  var d=new Date(ts.slice(0,19)+'Z');d.setUTCHours(d.getUTCHours()-3);
  return d.getUTCFullYear()+'-'+('0'+(d.getUTCMonth()+1)).slice(-2)+'-'+('0'+d.getUTCDate()).slice(-2);
}
function renderLog(){
  var pan=document.getElementById('p-log');
  if(!LOG||!LOG.length){pan.innerHTML='<div class="rkhint" style="text-align:center;padding:30px">更新履歴はまだありません。「更新して」を実行すると差分が記録されます。</div>';return;}
  var n=new Date();n.setHours(n.getHours()-3);
  function k(x){return x.getFullYear()+'-'+('0'+(x.getMonth()+1)).slice(-2)+'-'+('0'+x.getDate()).slice(-2);}
  var todayK=k(n),yestK=k(new Date(n.getTime()-86400000));
  var days={};LOG.forEach(function(e){var kk=dayKey(e.ts);(days[kk]=days[kk]||[]).push(e);});
  var dayKeysAsc=Object.keys(days).sort();        // 古い→新しい（本文の並び）
  var dayKeysDesc=dayKeysAsc.slice().reverse();   // 新しい→古い（タブの並び）
  var recent3=dayKeysDesc.slice(0,3);             // 最近3日＝デフォルト表示
  function label(kk){return kk===todayK?'本日':(kk===yestK?'昨日':kk.slice(5).replace('-','/'));}
  function dtxt(kk){return kk.slice(5).replace('-','/');}
  function relBadge(kk){var r=kk===todayK?'本日':(kk===yestK?'昨日':'');return r?'<span class="rel">'+r+'</span>':'';}
  function dayTotal(kk){return days[kk].reduce(function(s,e){return s+(e.na-e.oa);},0);}
  // カテゴリ（論点）遷移：op%→np% から 完了(CC_TH%到達)・新規着手(0→1+) を数える
  function catDelta(tabsList){
    var m={};(tabsList||[]).forEach(function(t){
      var k=t.subj+'|'+t.tab,o=+t.op||0,nn=+t.np||0;
      if(!m[k])m[k]={op:o,np:nn};else{m[k].op=Math.min(m[k].op,o);m[k].np=Math.max(m[k].np,nn);}
    });
    var done=0,start=0;
    Object.keys(m).forEach(function(k){var o=m[k].op,nn=m[k].np;if(o<CC_TH&&nn>=CC_TH)done++;if(o===0&&nn>0)start++;});
    return {touched:Object.keys(m).length,done:done,start:start};
  }
  function dayCat(kk){var all=[];days[kk].forEach(function(e){(e.tabs||[]).forEach(function(t){all.push(t);});});return catDelta(all);}
  function nTopicSpan(cd){return cd.touched?'<span class="ntopic">'+cd.touched+'論点</span>':'';}
  function catTxt(cd){var a=[];if(cd.done)a.push('完了+'+cd.done);if(cd.start)a.push('着手+'+cd.start);return a.join('・');}
  function catSpan(cd){var s=catTxt(cd);return s?'<span class="catsum">'+s+'</span>':'';}
  function tabBadge(t){var o=+t.op||0,n=+t.np||0;if(o<CC_TH&&n>=CC_TH)return '<span class="cbadge cb-done">✅完了</span>';if(o===0&&n>0)return '<span class="cbadge cb-start">🆕着手</span>';return '';}

      +(!compact&&e.subs&&e.subs.length?'<span>｜ '+e.subs.map(function(s){return esc(s.name)+' +'+s.d;}).join(' / ')+'</span>':'')+'</div>';
    (e.tabs||[]).forEach(function(t){
      var seg=[];if(t.ddq)seg.push('クイズ'+(t.ddq>0?'+':'')+t.ddq);if(t.ddf)seg.push('穴埋め'+(t.ddf>0?'+':'')+t.ddf);
      var fn=t.file?esc((t.file+'').replace(/_m\.html$/,'').replace(/\.html$/,'')):'';
      h+='<div class="logrow"><span class="s">'+esc(t.subj)+'</span><span class="n">'+esc(t.tab)+'</span>'
        +(fn?'<span class="lf">'+fn+'</span>':'')+'<span class="dd">'+seg.join('・')+'</span><span class="pp">'+t.op+'%→'+t.np+'%</span>'+tabBadge(t)+'</div>';
      if(!compact)(t.cards||[]).forEach(function(c){var cs=[];if(c.dq)cs.push('ｸ'+(c.dq>0?'+':'')+c.dq);if(c.df)cs.push('穴'+(c.df>0?'+':'')+c.df);h+='<div class="logcard">- '+esc(c.title)+'：'+cs.join(' ')+'</div>';});
    });
    return h+'</div>';
  }
  // 日付サブタブ
  var hint='<div class="rkhint">日付タブで切替。<b>最近3日</b>は横並び（左が新しい日）。1日の区切り＝午前3時。</div>';
  var tabs='<div class="logtabs" id="logtabs"><button class="logtab active" data-sel="recent3">最近3日</button>';
  dayKeysDesc.forEach(function(kk){tabs+='<button class="logtab" data-sel="'+kk+'">'+esc(label(kk))+'</button>';});
  tabs+='</div>';
  // 最近3日＝3カラム横並び（左が新しい）
  var cols='<div class="logview" data-view="recent3"><div class="logcols">';
  recent3.forEach(function(kk){
    cols+='<div class="logcol"><div class="logcol-h"><span class="dt">'+dtxt(kk)+'</span>'+relBadge(kk)+nTopicSpan(dayCat(kk))+'<span class="sum">+'+dayTotal(kk)+'問</span>'+catSpan(dayCat(kk))+'</div>';
    days[kk].slice().sort(function(a,b){return a.ts<b.ts?-1:1;}).forEach(function(e){cols+=entRows(e,true);});
    cols+='</div>';
  });
  cols+='</div></div>';
  // 単日＝詳細（カードまで）
  var singles='';
  dayKeysAsc.forEach(function(kk){
    singles+='<div class="logview" data-view="'+kk+'" style="display:none"><div class="logday"><div class="logday-h"><span class="dt">'+dtxt(kk)+'</span>'+relBadge(kk)+nTopicSpan(dayCat(kk))+'<span class="sum">+'+dayTotal(kk)+'問</span>'+catSpan(dayCat(kk))+'</div>';
    days[kk].slice().sort(function(a,b){return a.ts<b.ts?-1:1;}).forEach(function(e){singles+=entRows(e,false);});
    singles+='</div></div>';
  });
  pan.innerHTML=hint+tabs+cols+singles;
  function apply(sel){
    pan.querySelectorAll('.logview').forEach(function(v){v.style.display=(v.getAttribute('data-view')===sel)?'':'none';});
    pan.querySelectorAll('.logtab').forEach(function(b){b.classList.toggle('active',b.getAttribute('data-sel')===sel);});
  }
  pan.querySelector('#logtabs').addEventListener('click',function(ev){var b=ev.target.closest?ev.target.closest('.logtab'):null;if(!b)return;apply(b.getAttribute('data-sel'));});
  apply('recent3');
}

    +'<br>並び：科目ごとに ランクS→A→B、同ランクは<b>達成率の低い順</b>。左端の□にチェックすると「最低限でOK」扱いになり、この一覧から消えます。'
    +(skipped?'<br><span style="color:var(--muted)">※□チェック済みで除外中：'+skipped+'論点</span>':'')+'</div>';
  /* ランク絞り込み（S/A/Bのみ）＝総合優先タブと同じ操作感・状態は独立保存 */
  var rAllOn=LO_RANKS.every(function(r){return loRanks.has(r);});
  h+='<div class="rfil"><span class="lb">ランク絞り込み:</span>'
    +'<button class="rfchip lofall"'+(rAllOn?' style="background:var(--accent);color:#fff;border-color:transparent"':'')+'>全</button>';
  LO_RANKS.forEach(function(rk){var on=loRanks.has(rk);
    h+='<button class="rfchip lofr" data-r="'+rk+'"'+(on?' style="background:'+RKCOL[rk]+';color:#fff;border-color:transparent"':'')+'>'+rk+'</button>';});
  h+='</div>';
  /* 科目絞り込み */
  var sAllOn=ALL_SUBJS.every(function(n){return loSubjs.has(n);});
  h+='<div class="rfil"><span class="lb">科目絞り込み:</span>'
    +'<button class="rfchip losfall"'+(sAllOn?' style="background:var(--accent);color:#fff;border-color:transparent"':'')+'>全</button>';
  ALL_SUBJS.forEach(function(n){var on=loSubjs.has(n);
    h+='<button class="rfchip losf" data-subj="'+esc(n)+'"'+(on?' style="background:var(--accent);color:#fff;border-color:transparent"':'')+'>'+esc(subjShort(n))+'</button>';});
  h+='</div>';
  h+='<div class="ccsum">対象 <b>'+lows.length+'</b> 論点（うち<span class="cc-todo">未着手0%: '+zero+'</span>）／絞り込み前のS・A・B未達 '
    +base.length+' 論点</div>';
  var names=Object.keys(bySubj).sort(function(a,b){return bySubj[b].length-bySubj[a].length;});
  if(!names.length)h+='<div class="rkhint" style="text-align:center">'
    +(base.length?'絞り込み条件に該当する論点がありません（チップで対象を広げてください）。':'該当なし＝S・A・Bはすべて'+LO_TH+'%以上です。')+'</div>';
  names.forEach(function(n){
    var ts=bySubj[n].slice().sort(function(a,b){
      return (LO_RANKS.indexOf(a.t.rank)-LO_RANKS.indexOf(b.t.rank))||(a.t.pct-b.t.pct);
    });
    var z=ts.filter(function(x){return x.t.pct===0;}).length;
    h+='<div class="rkgroup"><div class="rkband"><span class="rkbadge" style="background:#ef4444">'+ts.length+'</span>'
      +'<span class="rklabel">'+esc(n)+'（'+ts.length+'論点'+(z?'・未着手'+z:'')+'）</span></div>';
    ts.forEach(function(x){h+=growRow(x,true);});
    h+='</div>';
  });
  pan.innerHTML=h;
  pan.querySelectorAll('.lofr').forEach(function(b){b.addEventListener('click',function(){
    var r=b.getAttribute('data-r');if(loRanks.has(r))loRanks.delete(r);else loRanks.add(r);saveLoFil();renderLo();});});
  var lfa=pan.querySelector('.lofall');
  if(lfa)lfa.addEventListener('click',function(){
    if(LO_RANKS.every(function(r){return loRanks.has(r);}))loRanks=new Set();else loRanks=new Set(LO_RANKS);
    saveLoFil();renderLo();});
  pan.querySelectorAll('.losf').forEach(function(b){b.addEventListener('click',function(){
    var n=b.getAttribute('data-subj');if(loSubjs.has(n))loSubjs.delete(n);else loSubjs.add(n);saveLoFil();renderLo();});});
  var lsa=pan.querySelector('.losfall');
  if(lsa)lsa.addEventListener('click',function(){
    if(ALL_SUBJS.every(function(n){return loSubjs.has(n);}))loSubjs=new Set();else loSubjs=new Set(ALL_SUBJS);
    saveLoFil();renderLo();});
}
renderLo();
/* 最低限チェックのトグル（各科目タブ／総合優先で共有・俯瞰の完了数に即反映） */
document.addEventListener('change',function(ev){
  var c=ev.target;if(!c||!c.classList||!c.classList.contains('mincheck'))return;
  toggleMin(c.getAttribute('data-subj'),c.getAttribute('data-tab'),c.checked);
  if(typeof renderLo==='function')renderLo();   /* □チェックで未達一覧からも即消す */
});

var tg=document.getElementById('tg');
function show(which){
  document.querySelectorAll('.tabbtn').forEach(function(b){b.classList.toggle('active',b.id==='t-'+which);});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.toggle('active',p.id==='p-'+which);});
  tg.style.display=which==='dt'?'block':'none';window.scrollTo(0,0);
}
document.getElementById('t-pr').addEventListener('click',function(){show('pr');});
document.getElementById('t-ov').addEventListener('click',function(){show('ov');});
document.getElementById('t-dt').addEventListener('click',function(){show('dt');});
var op=false;
tg.addEventListener('click',function(){op=!op;this.textContent=op?'すべて閉じる':'すべて展開';
  document.querySelectorAll('#p-dt details').forEach(function(d){d.open=op;});});
</script>
